[paths]
image_dir = "image"
dataset_dir = "dataset"

[fetch]
dataset_url = "https://github.com/ultralytics/assets/releases/download/v0.0.0/coco128.zip"
archive_name = "coco128.zip"

[setup]
train_split = 0.8
random_seed = 42

[train]
model_name = "yolo26n.pt"
image_size = 640
epochs = 32
batch_size = 8
device = "auto"

[train.hyperparameters]
patience = 100
optimizer = "AdamW"
initial_learning_rate = 0.01
final_learning_rate_factor = 0.01
momentum = 0.937
weight_decay = 0.0005
warmup_epochs = 3.0
box_loss_gain = 7.5
class_loss_gain = 0.5
dfl_loss_gain = 1.5
hue_augmentation = 0.015
saturation_augmentation = 0.7
value_augmentation = 0.4
rotation_degrees = 0.0
translation_fraction = 0.1
scaling_gain = 0.5
shear_degrees = 0.0
perspective_fraction = 0.0
vertical_flip_probability = 0.0
horizontal_flip_probability = 0.5
mosaic_probability = 1.0
mixup_probability = 0.0
copy_paste_probability = 0.0
workers = 0

[eval]
dataset_yaml = "dataset/train/dataset.yaml"

[infer]
dataset_name = "augmented"

[watch]
source = ""
confidence = 0.25
image_size = 640
window_name = "YOLO Watch"

[tracking]
enabled = true
project_name = "yolo-fine-tuning"
auto_log_gpu = true
gpu_log_interval_seconds = 10.0
log_every_n_steps = 1
max_logged_images = 6
max_logged_table_rows = 200
