[paths]
image_dir = "image"
augment_source_dir = "images"
dataset_dir = "dataset"

[fetch]
dataset_url = "https://github.com/ultralytics/assets/releases/download/v0.0.0/coco128.zip"
archive_name = "coco128.zip"

[setup]
train_split = 0.8
random_seed = 42

[augment]
scale_min = 0.05
scale_max = 0.35
min_objects = 1
max_objects = 6

[train]
model_name = "yolo26n.pt"
image_size = 640
epochs = 32
batch_size = -1
device = "auto"

[train.hyperparameters]
patience = 100
optimizer = "AdamW"
initial_learning_rate = 0.01
final_learning_rate_factor = 0.01
momentum = 0.937
weight_decay = 0.0005
warmup_epochs = 3.0
box_loss_gain = 7.5
class_loss_gain = 0.5
dfl_loss_gain = 1.5
hsv_h = 0.015
hsv_s = 0.7
hsv_v = 0.4
degrees = 0.0
translate = 0.1
scale = 0.5
shear = 0.0
perspective = 0.0
flipud = 0.0
fliplr = 0.5
bgr = 0.0
mosaic = 1.0
close_mosaic = 0
mixup = 0.0
cutmix = 0.0
copy_paste = 0.0
copy_paste_mode = "flip"
auto_augment = "randaugment"
erasing = 0.4
workers = 0

[eval]
dataset_yaml = "dataset/train/dataset.yaml"

[infer]
dataset_name = "augmented"

[watch]
source = ""
confidence = 0.25
image_size = 640
window_name = "YOLO Watch"

[tracking]
enabled = true
project_name = "yolo-fine-tuning"
auto_log_gpu = true
gpu_log_interval_seconds = 10.0
log_every_n_steps = 1
max_logged_images = 6
max_logged_table_rows = 200
